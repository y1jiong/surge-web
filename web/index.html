<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surge Web - Download Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Surge Web</h1>
    <div id="status-bar">
      <span id="conn-status" class="dot disconnected"></span>
      <span id="conn-text">Disconnected</span>
    </div>
  </header>

  <section id="add-section">
    <form id="add-form">
      <input type="url" id="add-url" placeholder="Paste download URL here..." required autocomplete="off">
      <button type="submit">Add</button>
    </form>
    <button id="btn-toggle-advanced" class="toggle-btn">+ Advanced</button>
    <div id="advanced-area" style="display:none">
      <input type="text" id="add-filename" placeholder="Filename (optional)" autocomplete="off">
      <textarea id="add-headers" rows="5" placeholder="Custom headers (one per line)&#10;Cookie: session=abc123&#10;Authorization: Bearer token"></textarea>
    </div>
  </section>

  <section id="actions-bar">
    <button id="btn-clear-completed">Clear Completed</button>
    <button id="btn-clear-failed">Clear Failed</button>
    <div id="rate-limit-bar">
      <label>Global Limit:</label>
      <input type="number" id="global-rate" placeholder="Unlimited (B/s)" min="0" step="1024">
      <button id="btn-set-rate">Set</button>
    </div>
  </section>

  <section id="list-section">
    <div id="list-empty" class="empty-state">No downloads yet. Paste a URL above to start.</div>
    <table id="download-table" style="display:none">
      <thead>
        <tr>
          <th>Filename</th>
          <th>Size</th>
          <th>Progress</th>
          <th>Speed</th>
          <th>ETA</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="download-tbody"></tbody>
    </table>
  </section>
</div>
<script src="app.js"></script>
</body>
</html>
